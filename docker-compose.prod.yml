services:
  db:
    image: mysql:8.4
    container_name: assinaturas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - assinaturas-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - assinaturas

  backend:
    image: ${BACKEND_IMAGE:?configure BACKEND_IMAGE}
    container_name: assinaturas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Sao_Paulo}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SFTP_HOST: ${SFTP_HOST}
      SFTP_PORT: ${SFTP_PORT}
      SFTP_USER: ${SFTP_USER}
      SFTP_PASS: ${SFTP_PASS}
      SFTP_BASE_URL: ${SFTP_BASE_URL}
      SFTP_REMOTE_DIR: ${SFTP_REMOTE_DIR}
      NEXT_PUBLIC_SFTP_BASE_URL: ${NEXT_PUBLIC_SFTP_BASE_URL}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - assinaturas

  frontend:
    image: ${FRONTEND_IMAGE:?configure FRONTEND_IMAGE}
    container_name: assinaturas-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - assinaturas

volumes:
  assinaturas-db:

networks:
  assinaturas:
    driver: bridge
