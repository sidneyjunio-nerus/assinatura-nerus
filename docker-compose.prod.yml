services:
  caddy:
    image: caddy:2-alpine
    container_name: assinaturas-caddy
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - assinaturas

  backend:
    image: ghcr.io/sidneyjunio-nerus/assinatura-nerus/backend:latest
    container_name: assinaturas-backend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Sao_Paulo}
    networks:
      - assinaturas

  frontend:
    image: ghcr.io/sidneyjunio-nerus/assinatura-nerus/frontend:latest
    container_name: assinaturas-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      - backend
    networks:
      - assinaturas

volumes:
  caddy-data:
  caddy-config:

networks:
  assinaturas:
    driver: bridge
